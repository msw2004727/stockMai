databases:
  - name: stockmai-postgres
    databaseName: twstock
    user: twstock_user
    ipAllowList: []

services:
  - type: keyvalue
    name: stockmai-redis
    ipAllowList: []

  - type: web
    name: stockmai-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockmai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockmai-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: API_DAILY_LIMIT
        value: "200"
      - key: QUOTE_SHORT_CACHE_TTL_SECONDS
        value: "5"
      - key: QUOTE_FETCH_RATE_LIMIT
        value: "20"
      - key: QUOTE_FETCH_RATE_WINDOW_SECONDS
        value: "10"
      - key: TWSE_HOLIDAYS
        value: ""
      - key: AI_TIMEOUT_SECONDS
        value: "15"
      - key: AI_DAILY_BUDGET_USD
        value: "5.0"
      - key: AI_RETRY_COUNT
        value: "2"
      - key: AI_RETRY_BACKOFF_SECONDS
        value: "0.35"
      - key: AI_DEFAULT_PROVIDERS
        value: "claude,gpt5,grok,deepseek"
      - key: AI_PROVIDER_WEIGHTS
        value: "claude=1.0,gpt5=1.0,grok=1.0,deepseek=1.0"
      - key: CLAUDE_MODEL
        value: "claude-opus-4-6"
      - key: GPT_MODEL
        value: "gpt-5.2"
      - key: GROK_MODEL
        value: "grok-4.1-fast"
      - key: DEEPSEEK_MODEL
        value: "deepseek-chat"
      - key: CORS_ALLOW_ORIGINS
        value: "https://stockmai-frontend.onrender.com"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FINMIND_TOKEN
        sync: false

  - type: web
    name: stockmai-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: stockmai-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_API_USER_ID
        value: h5-demo-user
      - key: VITE_API_TOKEN_EXPIRES_MINUTES
        value: "60"

